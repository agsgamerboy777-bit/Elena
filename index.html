<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Journey for Moonpie 🎀</title>
    <style>
        :root {
            --bg: #FFF7FB;
            --pink: #FF8FC7;
            --accent: #D9B8FF;
            --text: #58445E;
            --moon: #FFF7CC;
            --soft: #FFEAF4;
            --gold: #FFF4C2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a14;
            overflow: hidden;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            cursor: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
        }

        #worldCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #uiLayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #uiLayer>* {
            pointer-events: auto;
        }

        /* Custom Cursor */
        .custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 20px;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease-out;
            filter: drop-shadow(0 0 8px rgba(255, 143, 199, 0.7));
            animation: cursorFloat 1.2s ease-in-out infinite;
        }
        @keyframes cursorFloat {
            0%,
            100% {
                translate: 0 0;
            }
            50% {
                translate: 0 -4px;
            }
        }
        .cursor-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            font-size: 10px;
            opacity: 0.7;
            animation: trailFade 0.7s ease-out forwards;
        }
        @keyframes trailFade {
            0% {
                opacity: 0.8;
                scale: 1;
            }
            100% {
                opacity: 0;
                scale: 0.3;
            }
        }

        /* Intro Overlay */
        #introOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: #0a0a14;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 1.5s ease-out;
            pointer-events: auto;
        }
        #introOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #introStars {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .intro-star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: starTwinkle 2s ease-in-out infinite;
        }
        @keyframes starTwinkle {
            0%,
            100% {
                opacity: 0.3;
                scale: 0.8;
            }
            50% {
                opacity: 1;
                scale: 1.3;
            }
        }
        #introMoon {
            font-size: 80px;
            opacity: 0;
            animation: moonRise 2s ease-out forwards;
            animation-delay: 1s;
            filter: drop-shadow(0 0 40px rgba(255, 247, 204, 0.8));
        }
        @keyframes moonRise {
            0% {
                opacity: 0;
                transform: translateY(60px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #introText {
            color: #fff;
            text-align: center;
            font-size: 1.3rem;
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            letter-spacing: 0.04em;
            opacity: 0;
            animation: textIn 1.5s ease-out forwards;
            animation-delay: 2.5s;
            line-height: 2;
        }
        @keyframes textIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        #introBtn {
            margin-top: 30px;
            padding: 14px 36px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #FF8FC7, #D9B8FF);
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            cursor: pointer;
            letter-spacing: 0.05em;
            opacity: 0;
            animation: textIn 1.5s ease-out forwards;
            animation-delay: 3.8s;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(255, 143, 199, 0.4);
            pointer-events: auto;
        }
        #introBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(255, 143, 199, 0.6);
        }
        #introBtn:active {
            transform: scale(0.95);
        }

        /* Music Button */
        #musicBtn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 50;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #FFD5E8;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(255, 143, 199, 0.3);
            transition: all 0.3s ease;
            pointer-events: auto;
            backdrop-filter: blur(10px);
        }
        #musicBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(255, 143, 199, 0.5);
        }
        #musicBtn.playing {
            animation: musicPulse 1.5s ease-in-out infinite;
        }
        @keyframes musicPulse {
            0%,
            100% {
                box-shadow: 0 4px 20px rgba(255, 143, 199, 0.3);
            }
            50% {
                box-shadow: 0 8px 36px rgba(255, 143, 199, 0.6);
            }
        }

        /* Message popup */
        #messagePopup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 60;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 28px 32px;
            text-align: center;
            font-family: 'Patrick Hand', 'Segoe UI', cursive;
            font-size: 1.3rem;
            color: #58445E;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 85vw;
            pointer-events: auto;
            backdrop-filter: blur(20px);
            border: 2px solid #FFD5E8;
        }
        #messagePopup.show {
            transform: translate(-50%, -50%) scale(1);
        }
        #messagePopup .close-btn {
            margin-top: 16px;
            padding: 8px 24px;
            border-radius: 20px;
            border: none;
            background: #FF8FC7;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        #messagePopup .close-btn:hover {
            background: #ff6fb5;
            transform: scale(1.04);
        }

        /* Ripple effect */
        .ripple {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 143, 199, 0.4);
            pointer-events: none;
            z-index: 55;
            animation: rippleOut 0.7s ease-out forwards;
        }
        @keyframes rippleOut {
            0% {
                width: 0;
                height: 0;
                opacity: 0.7;
            }
            100% {
                width: 80px;
                height: 80px;
                opacity: 0;
                margin-left: -40px;
                margin-top: -40px;
            }
        }

        /* Sparkle burst */
        .sparkle-burst {
            position: fixed;
            pointer-events: none;
            z-index: 56;
            font-size: 14px;
            animation: sparkleFly 0.8s ease-out forwards;
        }
        @keyframes sparkleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--dx), var(--dy)) scale(0);
            }
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 65;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 22px;
            border-radius: 30px;
            font-family: 'Nunito', sans-serif;
            color: #58445E;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.5s ease;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Mobile touch indicator */
        @media (max-width: 768px) {
            #introText {
                font-size: 1.05rem;
            }
            #introBtn {
                font-size: 1rem;
                padding: 12px 28px;
            }
            #introMoon {
                font-size: 55px;
            }
            #messagePopup {
                font-size: 1.1rem;
                padding: 20px 24px;
                border-radius: 20px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Patrick+Hand&family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Intro Overlay -->
    <div id="introOverlay">
        <div id="introStars"></div>
        <div id="introMoon">🌙</div>
        <div id="introText">
            Every birthday deserves a little magic.<br>
            So I made one.<br>
            Especially for you.
        </div>
        <button id="introBtn">Begin Journey ✨</button>
    </div>

    <!-- World Canvas -->
    <canvas id="worldCanvas"></canvas>

    <!-- UI Layer -->
    <div id="uiLayer">
        <div id="messagePopup">
            <div id="messageText"></div>
            <button class="close-btn" id="closePopup">Close 💖</button>
        </div>
        <div id="toast"></div>
    </div>

    <!-- Music Button -->
    <button id="musicBtn" title="Toggle Music">🎵</button>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor">💕</div>

    <script>
        (function() {
            // ─────────────────────────────────────
            // DOM ELEMENTS
            // ─────────────────────────────────────
            const canvas = document.getElementById('worldCanvas');
            const ctx = canvas.getContext('2d');
            const introOverlay = document.getElementById('introOverlay');
            const introBtn = document.getElementById('introBtn');
            const introStars = document.getElementById('introStars');
            const messagePopup = document.getElementById('messagePopup');
            const messageText = document.getElementById('messageText');
            const closePopupBtn = document.getElementById('closePopup');
            const toast = document.getElementById('toast');
            const musicBtn = document.getElementById('musicBtn');
            const customCursor = document.getElementById('customCursor');
            const uiLayer = document.getElementById('uiLayer');

            // ─────────────────────────────────────
            // AUDIO ENGINE (Simple Music Box)
            // ─────────────────────────────────────
            let audioCtx = null;
            let musicPlaying = false;
            let musicGain = null;
            let musicInterval = null;

            const musicBoxNotes = [
                262, 294, 330, 349, 392, 349, 330, 294, // C D E F G F E D
                262, 330, 392, 523, 392, 330, 294, 262, // C E G C5 G E D C
                294, 349, 440, 392, 349, 330, 294, 262, // D F A G F E D C
                262, 294, 330, 262, 349, 330, 294, 262, // C D E C F E D C
            ];

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    musicGain = audioCtx.createGain();
                    musicGain.gain.value = 0.15;
                    musicGain.connect(audioCtx.destination);
                }
            }

            function playMusicBoxNote(freq, time, duration = 0.5) {
                if (!audioCtx || !musicGain) return;
                const osc = audioCtx.createOscillator();
                const noteGain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                noteGain.gain.value = 0;
                noteGain.gain.linearRampToValueAtTime(0.4, time + 0.05);
                noteGain.gain.exponentialRampToValueAtTime(0.001, time + duration);
                osc.connect(noteGain);
                noteGain.connect(musicGain);
                osc.start(time);
                osc.stop(time + duration);
            }

            function startMusicBox() {
                if (musicPlaying) return;
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                musicPlaying = true;
                musicBtn.textContent = '🎶';
                musicBtn.classList.add('playing');
                let noteIndex = 0;
                const bpm = 90;
                const noteDuration = 60 / bpm;

                function playNext() {
                    if (!musicPlaying) return;
                    const freq = musicBoxNotes[noteIndex % musicBoxNotes.length];
                    playMusicBoxNote(freq, audioCtx.currentTime, noteDuration * 0.85);
                    noteIndex++;
                    const nextDelay = (noteDuration * 1000) * (Math.random() * 0.3 + 0.85);
                    musicInterval = setTimeout(playNext, nextDelay);
                }
                playNext();
            }

            function stopMusicBox() {
                musicPlaying = false;
                if (musicInterval) clearTimeout(musicInterval);
                musicBtn.textContent = '🎵';
                musicBtn.classList.remove('playing');
            }

            function toggleMusic() {
                initAudio();
                if (musicPlaying) {
                    stopMusicBox();
                } else {
                    startMusicBox();
                }
            }
            musicBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleMusic();
            });

            // ─────────────────────────────────────
            // INTRO SETUP
            // ─────────────────────────────────────
            function createIntroStars() {
                for (let i = 0; i < 80; i++) {
                    const star = document.createElement('div');
                    star.className = 'intro-star';
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.width = (Math.random() * 3 + 1) + 'px';
                    star.style.height = star.style.width;
                    star.style.animationDelay = Math.random() * 2 + 's';
                    star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                    introStars.appendChild(star);
                }
            }
            createIntroStars();

            // ─────────────────────────────────────
            // CANVAS SETUP
            // ─────────────────────────────────────
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            // ─────────────────────────────────────
            // WORLD STATE
            // ─────────────────────────────────────
            const WORLD_WIDTH = 9000; // Total world width for all scenes
            const GROUND_Y_RATIO = 0.72; // Ground line

            // Scene definitions (world x-coordinates)
            const scenes = [
                { id: 'moonGate', name: 'Moon Gate', x: 400, width: 800, color: '#E8D5F5', groundColor: '#d4c4e8',
                    skyTop: '#1a1a3e', skyBot: '#3d2f5c' },
                { id: 'flowerGarden', name: 'Flower Garden', x: 1400, width: 900, color: '#FFEAF4',
                    groundColor: '#f0d8e8', skyTop: '#ffe4f0', skyBot: '#ffd0e8' },
                { id: 'letterTree', name: 'Letter Tree', x: 2500, width: 800, color: '#FFF7FB', groundColor: '#f5e8f0',
                    skyTop: '#fff0f7', skyBot: '#ffe8f2' },
                { id: 'memoryPath', name: 'Memory Path', x: 3500, width: 900, color: '#F8EFFF',
                    groundColor: '#e8d8f0', skyTop: '#2d1f3d', skyBot: '#5c3f6e' },
                { id: 'giftMeadow', name: 'Gift Meadow', x: 4600, width: 900, color: '#FFF7FB', groundColor: '#f2e8f5',
                    skyTop: '#ffe8f5', skyBot: '#ffd5ec' },
                { id: 'plushieCorner', name: 'Plushie Corner', x: 5700, width: 900, color: '#FFFAF0',
                    groundColor: '#f5ead8', skyTop: '#fff8ee', skyBot: '#ffe8d5' },
                { id: 'cloudBridge', name: 'Cloud Bridge', x: 6800, width: 900, color: '#F0F0FF',
                    groundColor: '#d8d8f0', skyTop: '#c8d8ff', skyBot: '#e8f0ff' },
                { id: 'wishLake', name: 'Wish Lake', x: 7900, width: 800, color: '#E8F0FF', groundColor: '#c0d0e8',
                    skyTop: '#1a2a4e', skyBot: '#3a5a8e' },
                { id: 'birthdayHill', name: 'Birthday Hill', x: 8700, width: 800, color: '#FFF7FB',
                    groundColor: '#f0e0f0', skyTop: '#3d1f4e', skyBot: '#7e4f8e' },
            ];

            function getGroundY() {
                return canvas.height * GROUND_Y_RATIO;
            }

            function getSceneAt(x) {
                for (const s of scenes) {
                    if (x >= s.x - s.width / 2 && x < s.x + s.width / 2) return s;
                }
                if (x < scenes[0].x - scenes[0].width / 2) return scenes[0];
                if (x > scenes[scenes.length - 1].x + scenes[scenes.length - 1].width / 2) return scenes[scenes.length -
                    1];
                return null;
            }

            // ─────────────────────────────────────
            // MASCOT STATE
            // ─────────────────────────────────────
            const mascot = {
                x: scenes[0].x,
                y: 0,
                targetX: scenes[0].x,
                targetY: 0,
                size: 22,
                bobOffset: 0,
                trail: [],
                sparkleTimer: 0,
                isMoving: false,
                facingRight: true,
                idleTimer: 0,
                blinkTimer: 0,
                isBlinking: false,
            };

            function updateMascotY() {
                mascot.y = getGroundY() - mascot.size - 8;
                mascot.targetY = mascot.y;
            }
            updateMascotY();

            // ─────────────────────────────────────
            // CAMERA STATE
            // ─────────────────────────────────────
            const camera = {
                x: scenes[0].x - canvas.width / 2,
                y: 0,
                targetX: scenes[0].x - canvas.width / 2,
                targetY: 0,
                shakeAmount: 0,
                shakeTimer: 0,
            };

            function updateCameraTarget() {
                camera.targetX = mascot.x - canvas.width / 2;
                camera.targetX = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, camera.targetX));
                camera.targetY = 0;
            }

            // ─────────────────────────────────────
            // PARTICLES
            // ─────────────────────────────────────
            const particles = [];
            const MAX_PARTICLES = 60;

            function spawnParticle(x, y, type = 'heart') {
                if (particles.length >= MAX_PARTICLES) particles.shift();
                const types = {
                    heart: { emoji: '💕', size: 14, life: 3.5, vy: -1.2, vxRange: 0.6, wobble: 0.5 },
                    sparkle: { emoji: '✨', size: 10, life: 2.5, vy: -0.8, vxRange: 0.5, wobble: 0.3 },
                    petal: { emoji: '🌸', size: 12, life: 4, vy: -0.5, vxRange: 0.8, wobble: 1.2 },
                    star: { emoji: '⭐', size: 10, life: 3, vy: -1, vxRange: 0.4, wobble: 0.4 },
                    leaf: { emoji: '🍃', size: 10, life: 3.5, vy: -0.6, vxRange: 0.7, wobble: 1 },
                };
                const t = types[type] || types.heart;
                particles.push({
                    x,
                    y,
                    emoji: t.emoji,
                    size: t.size,
                    life: t.life,
                    maxLife: t.life,
                    vx: (Math.random() - 0.5) * t.vxRange * 60,
                    vy: -Math.random() * 1.5 * 50 - 20,
                    wobble: t.wobble,
                    wobbleSpeed: Math.random() * 3 + 2,
                    wobbleOffset: Math.random() * Math.PI * 2,
                    gravity: 0.3,
                });
            }

            function updateParticles(dt) {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    p.vy += p.gravity * 50 * dt;
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.x += Math.sin(p.wobbleOffset + p.life * p.wobbleSpeed) * p.wobble * 30 * dt;
                }
            }

            function drawParticles(ctx, cam) {
                for (const p of particles) {
                    const alpha = Math.max(0, p.life / p.maxLife);
                    const sx = p.x - cam.x;
                    const sy = p.y - cam.y;
                    if (sx < -50 || sx > canvas.width + 50 || sy < -50 || sy > canvas.height + 50) continue;
                    ctx.globalAlpha = alpha;
                    ctx.font = `${p.size}px serif`;
                    ctx.fillText(p.emoji, sx, sy);
                }
                ctx.globalAlpha = 1;
            }

            // ─────────────────────────────────────
            // FLOATING AMBIENT ELEMENTS
            // ─────────────────────────────────────
            const floatingElements = [];
            for (let i = 0; i < 30; i++) {
                floatingElements.push({
                    x: Math.random() * WORLD_WIDTH,
                    y: Math.random() * canvas.height * 0.5,
                    emoji: ['🌸', '💮', '🦋', '✨', '🌷', '💫', '🌿', '🕊️', '💖'][Math.floor(Math.random() * 9)],
                    size: Math.random() * 14 + 8,
                    speedX: (Math.random() - 0.5) * 25,
                    speedY: (Math.random() - 0.5) * 15,
                    wobbleAmp: Math.random() * 40 + 20,
                    wobbleSpeed: Math.random() * 1.5 + 0.5,
                    wobbleOffset: Math.random() * Math.PI * 2,
                    alpha: Math.random() * 0.5 + 0.3,
                });
            }

            function updateFloatingElements(dt) {
                for (const fe of floatingElements) {
                    fe.x += fe.speedX * dt;
                    fe.y += fe.speedY * dt;
                    if (fe.x < -100) fe.x = WORLD_WIDTH + 100;
                    if (fe.x > WORLD_WIDTH + 200) fe.x = -100;
                    if (fe.y < -100) fe.y = canvas.height + 100;
                    if (fe.y > canvas.height + 100) fe.y = -100;
                }
            }

            // ─────────────────────────────────────
            // INTERACTIVE OBJECTS STATE
            // ─────────────────────────────────────
            const interactiveObjects = [];
            // These will be defined per scene and checked during rendering

            const plushieMessages = [
                "You deserve every happiness. 💖",
                "You'll always have a place in my heart. 🫶",
                "Smile more today! ❤️",
                "I wish I could celebrate beside you. 🎂",
                "I hope your birthday feels magical. ✨",
                "You're the sweetest person I know. 🍯",
                "Every day is brighter with you in it. ☀️",
                "Sending you the biggest hug! 🤗",
                "You make the world a softer place. 🌸",
                "I'm so lucky to know you. 🍀",
                "You're a dream come true. 🌙",
                "Stay as wonderful as you are. 🎀",
                "Thinking of you always. 💭",
                "You light up every room. 💡",
                "Forever cheering for you! 📣",
            ];

            const wishMessages = [
                "I hope every dream of yours comes true. 🌟",
                "You deserve the happiest life. 💝",
                "I'm always cheering for you. 📣",
                "May all your wishes bloom. 🌷",
                "The universe smiles upon you. 🌌",
                "Your happiness is my wish too. 💫",
            ];

            let openedGift1 = false;
            let openedGift2 = false;
            let lantern1Lit = false;
            let lantern2Lit = false;
            let letterOpened = false;
            let wishLanternSent = false;
            let plushieHugged = null;
            let birthdayGiftOpened = false;

            function getInteractiveForScene(scene) {
                const objs = [];
                const gy = getGroundY();
                if (scene.id === 'moonGate') {
                    objs.push({ x: scene.x, y: gy - 120, w: 70, h: 120, type: 'gate', label: 'Moon Gate 🚪',
                        sceneId: scene.id });
                }
                if (scene.id === 'flowerGarden') {
                    objs.push({ x: scene.x + 100, y: gy - 90, w: 50, h: 90, type: 'envelope', label: 'Letter 💌',
                        sceneId: scene.id });
                }
                if (scene.id === 'memoryPath') {
                    objs.push({ x: scene.x - 200, y: gy - 60, w: 35, h: 60, type: 'lantern1', label: 'Lantern 💞',
                        sceneId: scene.id });
                    objs.push({ x: scene.x + 200, y: gy - 60, w: 35, h: 60, type: 'lantern2', label: 'Lantern 🎀',
                        sceneId: scene.id });
                }
                if (scene.id === 'giftMeadow') {
                    objs.push({ x: scene.x - 150, y: gy - 45, w: 50, h: 45, type: 'gift1', label: 'Gift 🎁',
                    sceneId: scene.id });
                    objs.push({ x: scene.x + 150, y: gy - 45, w: 50, h: 45, type: 'gift2', label: 'Gift 🎀',
                    sceneId: scene.id });
                }
                if (scene.id === 'plushieCorner') {
                    const plushies = ['🐻', '🐰', '🐱', '🐧', '🦊'];
                    for (let i = 0; i < plushies.length; i++) {
                        objs.push({ x: scene.x - 250 + i * 110, y: gy - 40, w: 40, h: 40, type: 'plushie',
                            plushieIndex: i, plushieEmoji: plushies[i], label: plushies[i], sceneId: scene.id });
                    }
                }
                if (scene.id === 'cloudBridge') {
                    for (let i = 0; i < 3; i++) {
                        objs.push({ x: scene.x - 180 + i * 160, y: gy - 70 - i * 15, w: 30, h: 30, type: 'wish',
                            wishIndex: i, label: '✨', sceneId: scene.id });
                    }
                }
                if (scene.id === 'wishLake') {
                    objs.push({ x: scene.x + 80, y: gy - 30, w: 35, h: 30, type: 'wishLantern', label: '🏮',
                    sceneId: scene.id });
                }
                if (scene.id === 'birthdayHill') {
                    objs.push({ x: scene.x, y: gy - 55, w: 55, h: 50, type: 'birthdayGift', label: '🎀 Gift',
                    sceneId: scene.id });
                }
                return objs;
            }

            function getObjectsNear(x, range = 100) {
                const scene = getSceneAt(x);
                if (!scene) return [];
                const objs = getInteractiveForScene(scene);
                return objs.filter(o => Math.abs(o.x - x) < range);
            }

            // ─────────────────────────────────────
            // RENDER WORLD
            // ─────────────────────────────────────
            function drawSkyGradient(ctx, cam, scene) {
                if (!scene) {
                    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                    grad.addColorStop(0, '#ffe8f5');
                    grad.addColorStop(1, '#ffd5ec');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    return;
                }
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, scene.skyTop || '#ffe8f5');
                grad.addColorStop(0.7, scene.skyBot || '#ffd5ec');
                grad.addColorStop(1, scene.groundColor || '#f2e8f5');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            function drawGround(ctx, cam, scene) {
                const gy = getGroundY();
                const groundGrad = ctx.createLinearGradient(0, gy, 0, canvas.height);
                groundGrad.addColorStop(0, scene ? scene.groundColor : '#f2e8f5');
                groundGrad.addColorStop(0.3, scene ? scene.groundColor : '#e8d8f0');
                groundGrad.addColorStop(1, '#c8b8d8');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, gy, canvas.width, canvas.height - gy);

                // Ground line with subtle grass
                ctx.strokeStyle = 'rgba(180,160,190,0.4)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                const startX = -cam.x;
                ctx.moveTo(startX, gy);
                for (let x = startX; x < canvas.width + 100; x += 8) {
                    const waveY = gy + Math.sin(x * 0.05 + cam.x * 0.03) * 5;
                    ctx.lineTo(x, waveY);
                }
                ctx.stroke();

                // Little grass tufts
                ctx.fillStyle = '#b8c8a8';
                for (let x = startX; x < canvas.width + 100; x += 25) {
                    const wx = x + Math.sin(x * 0.1) * 8;
                    const wy = gy + Math.sin(x * 0.04 + cam.x * 0.02) * 3;
                    ctx.fillText('🌿', wx, wy - 5);
                }
            }

            function drawMoonGate(ctx, cam, scene) {
                const gy = getGroundY();
                const gx = scene.x - cam.x;
                const gy2 = gy;
                // Glowing arch
                const archGrad = ctx.createLinearGradient(gx, gy2 - 130, gx, gy2);
                archGrad.addColorStop(0, '#FFF7CC');
                archGrad.addColorStop(0.5, '#FFE8A0');
                archGrad.addColorStop(1, '#D9B8FF');
                ctx.fillStyle = archGrad;
                ctx.shadowColor = 'rgba(255,247,204,0.7)';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(gx, gy2 - 60, 55, Math.PI, 0);
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#FFE8A0';
                ctx.stroke();
                ctx.fillStyle = 'rgba(255,247,204,0.3)';
                ctx.fill();
                ctx.shadowBlur = 0;

                // Pillars
                ctx.fillStyle = '#e8d8f8';
                ctx.fillRect(gx - 58, gy2 - 60, 10, 60);
                ctx.fillRect(gx + 48, gy2 - 60, 10, 60);

                // Flowers around gate
                const flowerPositions = [
                    [-75, 8],
                    [65, 5],
                    [-55, 15],
                    [55, 12],
                    [-90, 3],
                    [85, 0]
                ];
                for (const [fx, fy] of flowerPositions) {
                    ctx.fillText('🌸', gx + fx, gy2 - fy);
                }
                ctx.fillText('🦋', gx - 40, gy2 - 30);
                ctx.fillText('🦋', gx + 50, gy2 - 25);
            }

            function drawFlowerGarden(ctx, cam, scene) {
                const gy = getGroundY();
                const sx = scene.x - cam.x;
                // Many flowers
                for (let i = -6; i <= 6; i++) {
                    const fx = sx + i * 55;
                    const fy = gy + Math.sin(i * 0.7) * 8;
                    const flowers = ['🌸', '🌷', '💮', '🌺', '🌼', '💐'];
                    ctx.fillText(flowers[Math.abs(i) % flowers.length], fx, fy - 8);
                    if (i % 2 === 0) ctx.fillText('🌿', fx + 12, fy - 2);
                }
                // Giant tree
                const treeX = sx + 100;
                const treeY = gy - 100;
                ctx.fillStyle = '#8B6B4D';
                ctx.fillRect(treeX - 10, treeY + 20, 22, 80);
                ctx.fillStyle = '#7CB87C';
                ctx.beginPath();
                ctx.arc(treeX + 1, treeY, 55, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#8FD18F';
                ctx.beginPath();
                ctx.arc(treeX - 15, treeY - 10, 35, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(treeX + 20, treeY - 5, 38, 0, Math.PI * 2);
                ctx.fill();
                // Hanging envelope
                const envX = treeX - 5;
                const envY = treeY + 30;
                ctx.fillStyle = '#FFFEF0';
                ctx.fillRect(envX - 15, envY - 10, 30, 22);
                ctx.strokeStyle = '#D9B8FF';
                ctx.lineWidth = 2;
                ctx.strokeRect(envX - 15, envY - 10, 30, 22);
                ctx.fillText('💌', envX - 8, envY + 4);
                // Ribbon
                ctx.fillStyle = '#FF8FC7';
                ctx.fillRect(envX - 2, envY - 14, 4, 28);
            }

            function drawMemoryPath(ctx, cam, scene) {
                const gy = getGroundY();
                const sx = scene.x - cam.x;
                // Stone path
                ctx.fillStyle = '#c8b8a8';
                for (let i = -5; i <= 5; i++) {
                    ctx.beginPath();
                    ctx.ellipse(sx + i * 50, gy + 5, 18, 8, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Lanterns
                const lx1 = sx - 200;
                const lx2 = sx + 200;
                const ly = gy - 55;
                [lx1, lx2].forEach((lx, idx) => {
                    const lit = idx === 0 ? lantern1Lit : lantern2Lit;
                    ctx.fillStyle = '#e8d8c8';
                    ctx.fillRect(lx - 8, ly, 16, 30);
                    ctx.fillStyle = lit ? '#FFE8A0' : '#d8c8b8';
                    ctx.shadowColor = lit ? 'rgba(255,220,150,0.8)' : 'transparent';
                    ctx.shadowBlur = lit ? 25 : 0;
                    ctx.beginPath();
                    ctx.arc(lx, ly - 5, 14, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillText(idx === 0 ? '💞' : '🎀', lx - 8, ly - 12);
                });
            }

            function drawGiftMeadow(ctx, cam, scene) {
                const gy = getGroundY();
                const sx = scene.x - cam.x;
                // Huge flowers
                for (let i = -3; i <= 3; i++) {
                    ctx.fillText('🌻', sx + i * 80, gy - 20);
                    ctx.fillText('🌿', sx + i * 80 + 15, gy - 5);
                }
                // Gifts
                const g1x = sx - 150;
                const g2x = sx + 150;
                const gy2 = gy - 38;
                [g1x, g2x].forEach((gx, idx) => {
                    const opened = idx === 0 ? openedGift1 : openedGift2;
                    if (!opened) {
                        ctx.fillStyle = idx === 0 ? '#FFD5E8' : '#FFE8D5';
                        ctx.fillRect(gx - 20, gy2, 40, 35);
                        ctx.fillStyle = idx === 0 ? '#FF8FC7' : '#FFB88C';
                        ctx.fillRect(gx - 2, gy2 - 8, 4, 43);
                        ctx.fillText('🎀', gx - 8, gy2 - 8);
                    } else {
                        ctx.fillText('📦', gx - 12, gy2 + 5);
                        ctx.fillText('✨', gx + 5, gy2 - 10);
                    }
                });
                ctx.fillText('🦋', sx - 80, gy - 50);
                ctx.fillText('🦋', sx + 100, gy - 35);
            }

            function drawPlushieCorner(ctx, cam, scene) {
                const gy = getGroundY();
                const sx = scene.x - cam.x;
                // Wooden shelf
                ctx.fillStyle = '#c8a882';
                ctx.fillRect(sx - 280, gy - 35, 560, 12);
                ctx.fillStyle = '#b8956e';
                ctx.fillRect(sx - 280, gy - 38, 560, 4);
                // Plushies
                const plushies = ['🐻', '🐰', '🐱', '🐧', '🦊'];
                for (let i = 0; i < plushies.length; i++) {
                    const px = sx - 250 + i * 110;
                    const py = gy - 40;
                    ctx.fillText(plushies[i], px - 15, py);
                    if (plushieHugged === i) {
                        ctx.fillText('💕', px + 5, py - 18);
                    }
                }
                // Tiny toy shop sign
                ctx.fillStyle = '#FFFEF8';
                ctx.fillRect(sx - 50, gy - 80, 100, 30);
                ctx.strokeStyle = '#D9B8FF';
                ctx.lineWidth = 2;
                ctx.strokeRect(sx - 50, gy - 80, 100, 30);
                ctx.fillStyle = '#58445E';
                ctx.font = '11px "Fredoka", sans-serif';
                ctx.fillText('🧸 Plushie Corner', sx - 42, gy - 60);
            }

            function drawCloudBridge(ctx, cam, scene) {
                const gy = getGroundY();
                const sx = scene.x - cam.x;
                // Clouds below
                for (let i = -4; i <= 4; i++) {
                    const cx = sx + i * 90;
                    const cy = gy + 15 + Math.sin(i * 0.8) * 12;
                    ctx.fillStyle = 'rgba(255,255,255,0.8)';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 22, 0, Math.PI * 2);
                    ctx.arc(cx + 18, cy - 8, 18, 0, Math.PI * 2);
                    ctx.arc(cx - 14, cy - 4, 16, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Bridge
                ctx.fillStyle = 'rgba(230,220,250,0.7)';
                ctx.fillRect(sx - 300, gy - 65, 600, 20);
                ctx.strokeStyle = '#D9B8FF';
                ctx.lineWidth = 3;
                ctx.strokeRect(sx - 300, gy - 65, 600, 20);
                // Stars
                for (let i = -3; i <= 3; i++) {
                    ctx.fillText('⭐', sx + i * 70, gy - 50 - Math.abs(i) * 8);
                }
            }

            function drawWishLake(ctx, cam, scene) {
                const gy = getGroundY();
                const sx = scene.x - cam.x;
                // Lake
                const lakeGrad = ctx.createLinearGradient(0, gy - 30, 0, gy + 60);
                lakeGrad.addColorStop(0, 'rgba(150,180,220,0.6)');
                lakeGrad.addColorStop(0.5, 'rgba(100,140,200,0.8)');
                lakeGrad.addColorStop(1, 'rgba(60,80,140,0.9)');
                ctx.fillStyle = lakeGrad;
                ctx.beginPath();
                ctx.ellipse(sx, gy + 10, 280, 50, 0, 0, Math.PI * 2);
                ctx.fill();
                // Moon reflection
                ctx.fillStyle = 'rgba(255,247,204,0.5)';
                ctx.beginPath();
                ctx.arc(sx + 30, gy + 5, 20, 0, Math.PI * 2);
                ctx.fill();
                // Lantern
                const lx = sx + 80;
                const ly = gy - 20;
                ctx.fillText('🏮', lx - 12, ly);
                if (wishLanternSent) {
                    ctx.fillText('💫', lx + 40, ly - 30);
                }
            }

            function drawBirthdayHill(ctx, cam, scene) {
                const gy = getGroundY();
                const sx = scene.x - cam.x;
                // Hill
                const hillGrad = ctx.createLinearGradient(0, gy - 60, 0, gy + 40);
                hillGrad.addColorStop(0, '#f0e0f5');
                hillGrad.addColorStop(1, '#d8c8e8');
                ctx.fillStyle = hillGrad;
                ctx.beginPath();
                ctx.arc(sx, gy, 200, Math.PI, 0);
                ctx.fill();
                // Huge moon
                ctx.fillStyle = '#FFF7CC';
                ctx.shadowColor = 'rgba(255,247,204,0.8)';
                ctx.shadowBlur = 50;
                ctx.beginPath();
                ctx.arc(sx - 20, gy - 100, 55, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                // Stars
                for (let i = 0; i < 12; i++) {
                    const starX = sx - 180 + i * 35;
                    const starY = gy - 80 - Math.abs(i - 6) * 15;
                    ctx.fillText('✨', starX, starY);
                }
                // Gift
                const gx = sx;
                const gy2 = gy - 50;
                if (!birthdayGiftOpened) {
                    ctx.fillStyle = '#FFD5E8';
                    ctx.fillRect(gx - 22, gy2, 44, 38);
                    ctx.fillStyle = '#FF8FC7';
                    ctx.fillRect(gx - 2, gy2 - 8, 4, 46);
                    ctx.fillText('🎀', gx - 10, gy2 - 10);
                } else {
                    ctx.fillText('💝', gx - 15, gy2 + 5);
                    ctx.fillText('✨', gx + 10, gy2 - 15);
                    ctx.fillText('💖', gx - 5, gy2 - 25);
                }
                ctx.fillText('🦋', sx - 60, gy - 60);
                ctx.fillText('🦋', sx + 70, gy - 50);
            }

            function drawMascot(ctx, cam) {
                const mx = mascot.x - cam.x;
                const my = mascot.y - cam.y;
                const bob = Math.sin(mascot.bobOffset) * (mascot.isMoving ? 8 : 3);
                const drawY = my + bob;

                // Glow
                const glowGrad = ctx.createRadialGradient(mx, drawY, 5, mx, drawY, 35);
                glowGrad.addColorStop(0, 'rgba(255,220,180,0.7)');
                glowGrad.addColorStop(0.5, 'rgba(255,200,160,0.3)');
                glowGrad.addColorStop(1, 'rgba(255,180,140,0)');
                ctx.fillStyle = glowGrad;
                ctx.beginPath();
                ctx.arc(mx, drawY, 35, 0, Math.PI * 2);
                ctx.fill();

                // Body (glowing star shape)
                ctx.fillStyle = '#FFF8DC';
                ctx.shadowColor = 'rgba(255,220,150,0.9)';
                ctx.shadowBlur = 18;
                ctx.font = `${mascot.size+10}px serif`;
                ctx.fillText('⭐', mx - mascot.size / 2 - 5, drawY + mascot.size / 2);
                ctx.shadowBlur = 0;

                // Cute face
                const faceX = mx;
                const faceY = drawY - 2;
                ctx.fillStyle = '#333';
                ctx.beginPath();
                ctx.arc(faceX - 5, faceY - 3, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(faceX + 5, faceY - 3, 2.5, 0, Math.PI * 2);
                ctx.fill();
                // Blush
                ctx.fillStyle = 'rgba(255,150,150,0.5)';
                ctx.beginPath();
                ctx.arc(faceX - 8, faceY + 1, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(faceX + 8, faceY + 1, 4, 0, Math.PI * 2);
                ctx.fill();
                // Smile
                ctx.strokeStyle = '#555';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.arc(faceX, faceY + 1, 5, 0.1, Math.PI - 0.1);
                ctx.stroke();
            }

            function drawSceneDecorations(ctx, cam, scene) {
                if (!scene) return;
                switch (scene.id) {
                    case 'moonGate':
                        drawMoonGate(ctx, cam, scene);
                        break;
                    case 'flowerGarden':
                        drawFlowerGarden(ctx, cam, scene);
                        break;
                    case 'memoryPath':
                        drawMemoryPath(ctx, cam, scene);
                        break;
                    case 'giftMeadow':
                        drawGiftMeadow(ctx, cam, scene);
                        break;
                    case 'plushieCorner':
                        drawPlushieCorner(ctx, cam, scene);
                        break;
                    case 'cloudBridge':
                        drawCloudBridge(ctx, cam, scene);
                        break;
                    case 'wishLake':
                        drawWishLake(ctx, cam, scene);
                        break;
                    case 'birthdayHill':
                        drawBirthdayHill(ctx, cam, scene);
                        break;
                }
                // Draw scene label
                const sx = scene.x - cam.x;
                const gy = getGroundY();
                ctx.fillStyle = 'rgba(88,68,94,0.6)';
                ctx.font = '13px "Fredoka", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(scene.name, sx, gy - 140);
                ctx.textAlign = 'start';
            }

            function drawVignette(ctx) {
                const vignetteGrad = ctx.createRadialGradient(canvas.width / 2, canvas.height / 2, canvas.width * 0.45,
                    canvas.width / 2, canvas.height / 2, canvas.width * 0.75);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(20,10,30,0.35)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            function drawSceneIndicator(ctx, cam) {
                const scene = getSceneAt(mascot.x);
                if (!scene) return;
                const sx = scene.x - cam.x;
                const gy = getGroundY();
                // Subtle indicator dot
                const objs = getInteractiveForScene(scene);
                for (const obj of objs) {
                    const ox = obj.x - cam.x;
                    const oy = obj.y - cam.y;
                    const dist = Math.abs(mascot.x - obj.x);
                    if (dist < 120 && obj.type !== 'gate') {
                        ctx.fillStyle = 'rgba(255,143,199,0.5)';
                        ctx.beginPath();
                        ctx.arc(ox, oy - 20, 6 + Math.sin(Date.now() / 600) * 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillText('👆', ox - 8, oy - 32);
                    }
                }
            }

            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const scene = getSceneAt(mascot.x);

                drawSkyGradient(ctx, camera, scene);
                drawGround(ctx, camera, scene);

                // Draw floating ambient elements
                for (const fe of floatingElements) {
                    const fx = fe.x - camera.x;
                    const fy = fe.y - camera.y;
                    if (fx < -60 || fx > canvas.width + 60 || fy < -60 || fy > canvas.height + 60) continue;
                    ctx.globalAlpha = fe.alpha;
                    ctx.font = `${fe.size}px serif`;
                    ctx.fillText(fe.emoji, fx + Math.sin(fe.wobbleOffset + Date.now() / 1000 * fe.wobbleSpeed) * fe
                        .wobbleAmp * 0.3, fy);
                }
                ctx.globalAlpha = 1;

                drawSceneDecorations(ctx, camera, scene);
                drawParticles(ctx, camera);
                drawMascot(ctx, camera);
                drawSceneIndicator(ctx, camera);
                drawVignette(ctx);

                // Scene name at bottom
                if (scene) {
                    ctx.fillStyle = 'rgba(88,68,94,0.5)';
                    ctx.font = '12px "Nunito", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`✦ ${scene.name} ✦`, canvas.width / 2, canvas.height - 30);
                    ctx.textAlign = 'start';
                }
            }

            // ─────────────────────────────────────
            // GAME LOOP
            // ─────────────────────────────────────
            let lastTime = performance.now();
            let introComplete = false;

            function gameLoop(timestamp) {
                const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
                lastTime = timestamp;

                if (introComplete) {
                    // Update mascot
                    const dx = mascot.targetX - mascot.x;
                    const dist = Math.abs(dx);
                    if (dist > 1.5) {
                        mascot.isMoving = true;
                        const speed = 350;
                        const moveAmount = Math.sign(dx) * Math.min(speed * dt, dist);
                        mascot.x += moveAmount;
                        mascot.facingRight = moveAmount > 0;
                        mascot.bobOffset += dt * 8;
                    } else {
                        mascot.isMoving = false;
                        mascot.x = mascot.targetX;
                        mascot.bobOffset += dt * 1.5;
                    }
                    updateMascotY();
                    mascot.idleTimer += dt;
                    mascot.blinkTimer += dt;
                    if (mascot.blinkTimer > 3 + Math.random() * 4) {
                        mascot.isBlinking = true;
                        mascot.blinkTimer = 0;
                    } else if (mascot.blinkTimer > 0.15) {
                        mascot.isBlinking = false;
                    }

                    // Spawn ambient particles
                    if (Math.random() < dt * 2.5) {
                        const scene = getSceneAt(mascot.x);
                        const types = ['heart', 'sparkle', 'petal', 'star'];
                        const type = types[Math.floor(Math.random() * types.length)];
                        const px = mascot.x + (Math.random() - 0.5) * 400;
                        const py = getGroundY() - Math.random() * 200;
                        spawnParticle(px, py, type);
                    }

                    updateParticles(dt);
                    updateFloatingElements(dt);
                    updateCameraTarget();

                    // Camera smoothing
                    camera.x += (camera.targetX - camera.x) * Math.min(dt * 6, 1);
                    camera.y += (camera.targetY - camera.y) * Math.min(dt * 6, 1);
                    if (camera.shakeTimer > 0) {
                        camera.shakeTimer -= dt;
                        camera.x += (Math.random() - 0.5) * camera.shakeAmount;
                        camera.y += (Math.random() - 0.5) * camera.shakeAmount;
                        if (camera.shakeTimer <= 0) camera.shakeAmount = 0;
                    }
                    camera.x = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, camera.x));
                }

                render();
                requestAnimationFrame(gameLoop);
            }

            // ─────────────────────────────────────
            // INTERACTIONS
            // ─────────────────────────────────────
            function showMessage(msg, callback) {
                messageText.textContent = msg;
                messagePopup.classList.add('show');
                closePopupBtn.onclick = () => {
                    messagePopup.classList.remove('show');
                    if (callback) setTimeout(callback, 300);
                };
            }

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            function createRipple(x, y) {
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 700);
            }

            function createSparkleBurst(x, y) {
                const emojis = ['✨', '💕', '🌟', '💖', '🎀', '🌸'];
                for (let i = 0; i < 8; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle-burst';
                    sparkle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    sparkle.style.left = x + 'px';
                    sparkle.style.top = y + 'px';
                    sparkle.style.setProperty('--dx', (Math.random() - 0.5) * 100 + 'px');
                    sparkle.style.setProperty('--dy', (Math.random() - 0.5) * 100 - 30 + 'px');
                    sparkle.style.animationDuration = (Math.random() * 0.5 + 0.6) + 's';
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 900);
                }
            }

            function handleWorldClick(worldX, worldY, screenX, screenY) {
                if (!introComplete) return;
                createRipple(screenX, screenY);

                const scene = getSceneAt(worldX);
                const objs = getInteractiveForScene(scene);
                const gy = getGroundY();

                // Check if clicking near an interactive object
                let clickedObj = null;
                for (const obj of objs) {
                    const dx = Math.abs(worldX - obj.x);
                    const dy = Math.abs(worldY - obj.y);
                    const hitRange = Math.max(obj.w, obj.h) * 1.2;
                    if (dx < hitRange && dy < hitRange) {
                        clickedObj = obj;
                        break;
                    }
                }

                if (clickedObj) {
                    createSparkleBurst(screenX, screenY);
                    handleObjectInteraction(clickedObj, screenX, screenY);
                } else if (worldY < gy - 20) {
                    // Move mascot to clicked position
                    mascot.targetX = Math.max(100, Math.min(WORLD_WIDTH - 100, worldX));
                    mascot.targetY = getGroundY() - mascot.size - 8;
                    spawnParticle(worldX, worldY, 'sparkle');
                    if (worldX > mascot.x + 300 || worldX < mascot.x - 300) {
                        showToast('Walking... 🚶‍♂️✨');
                    }
                } else {
                    mascot.targetX = Math.max(100, Math.min(WORLD_WIDTH - 100, worldX));
                    mascot.targetY = getGroundY() - mascot.size - 8;
                }
            }

            function handleObjectInteraction(obj, sx, sy) {
                switch (obj.type) {
                    case 'gate':
                        showMessage(
                            'The Moon Gate slowly opens... soft wind brushes past. You step into a magical garden. 🌙✨',
                            () => {
                                mascot.targetX = scenes[1].x;
                                camera.shakeAmount = 8;
                                camera.shakeTimer = 0.4;
                                for (let i = 0; i < 15; i++) spawnParticle(obj.x, obj.y, 'sparkle');
                            });
                        break;
                    case 'envelope':
                        if (!letterOpened) {
                            letterOpened = true;
                            showMessage(
                                '💌 My dearest Moonpie,\n\nEvery birthday deserves a little magic—and you deserve all the magic in the world. From the moment we met, you\'ve made life brighter, softer, and infinitely sweeter.\n\nI hope this little journey brings a smile to your face, because your smile is my favorite thing in the universe.\n\nWith all my heart,\nMochi ❤️',
                                () => {
                                    for (let i = 0; i < 12; i++) spawnParticle(obj.x, obj.y, 'heart');
                                });
                        } else {
                            showMessage('You already opened this letter. It still smells like flowers. 🌸');
                        }
                        break;
                    case 'lantern1':
                        if (!lantern1Lit) {
                            lantern1Lit = true;
                            showMessage('💞 The Day We Met — 10/06\n\nThis lantern glows with the memory of that beautiful day.', () => {
                                for (let i = 0; i < 8; i++) spawnParticle(obj.x, obj.y, 'heart');
                            });
                        } else {
                            showMessage('The lantern glows warmly, reminding you of that special day. 💞');
                        }
                        break;
                    case 'lantern2':
                        if (!lantern2Lit) {
                            lantern2Lit = true;
                            showMessage('🎀 Our Anniversary — 18/06\n\nFlowers bloom around this lantern, celebrating love.', () => {
                                for (let i = 0; i < 10; i++) spawnParticle(obj.x, obj.y, 'petal');
                            });
                        } else {
                            showMessage('Anniversary memories dance in the lantern light. 🎀✨');
                        }
                        break;
                    case 'gift1':
                        if (!openedGift1) {
                            openedGift1 = true;
                            showMessage(
                                '🎁 Out of 4 billion girls...\n\nSomehow I still found the one who makes my heart happiest, even from 4,000 miles away. 💝',
                                () => {
                                    for (let i = 0; i < 14; i++) spawnParticle(obj.x, obj.y, 'sparkle');
                                });
                        } else {
                            showMessage('This gift has already been opened. Its message still rings true. 💝');
                        }
                        break;
                    case 'gift2':
                        if (!openedGift2) {
                            openedGift2 = true;
                            showMessage('🎀 The Prettiest Girl I\'ve Ever Met\n\nElena 🫶❤️\n\n—With love beyond any distance.',
                                () => {
                                    for (let i = 0; i < 16; i++) spawnParticle(obj.x, obj.y, 'heart');
                                });
                        } else {
                            showMessage('Elena 🫶❤️ — Always the prettiest, always the sweetest.');
                        }
                        break;
                    case 'plushie':
                        const msg = plushieMessages[obj.plushieIndex] || plushieMessages[0];
                        plushieHugged = obj.plushieIndex;
                        showMessage(`${obj.plushieEmoji} ${msg}`, () => {
                            plushieHugged = null;
                            spawnParticle(obj.x, obj.y, 'heart');
                        });
                        break;
                    case 'wish':
                        const wmsg = wishMessages[obj.wishIndex] || wishMessages[0];
                        showMessage(`✨ ${wmsg}`, () => {
                            spawnParticle(obj.x, obj.y, 'star');
                        });
                        break;
                    case 'wishLantern':
                        if (!wishLanternSent) {
                            wishLanternSent = true;
                            showMessage('🏮 Make a birthday wish...\n\n...I secretly wished for the same thing. 💫', () => {
                                for (let i = 0; i < 12; i++) spawnParticle(obj.x, obj.y, 'star');
                            });
                        } else {
                            showMessage('The lantern sails on, carrying our wishes to the stars. 🌌');
                        }
                        break;
                    case 'birthdayGift':
                        if (!birthdayGiftOpened) {
                            birthdayGiftOpened = true;
                            showMessage(
                                '🎀✨💖\n\nHappy Birthday\n\nTo my Moonpie 🎀\n\nLove,\nMochi 🎀\n\n💖✨🎀',
                                () => {
                                    for (let i = 0; i < 20; i++) {
                                        spawnParticle(obj.x, obj.y, Math.random() > 0.5 ? 'heart' : 'sparkle');
                                    }
                                    camera.shakeAmount = 5;
                                    camera.shakeTimer = 0.6;
                                    showToast('🎉 Happy Birthday, Moonpie! 🎂💝');
                                });
                        } else {
                            showMessage('Happy Birthday, Moonpie! 🎀 The magic never fades. 💖');
                        }
                        break;
                    default:
                        break;
                }
            }

            // ─────────────────────────────────────
            // EVENT LISTENERS
            // ─────────────────────────────────────
            function getWorldCoords(e) {
                const rect = canvas.getBoundingClientRect();
                const sx = e.clientX - rect.left;
                const sy = e.clientY - rect.top;
                const wx = sx + camera.x;
                const wy = sy + camera.y;
                return { wx, wy, sx: e.clientX, sy: e.clientY };
            }

            canvas.addEventListener('click', (e) => {
                const { wx, wy, sx, sy } = getWorldCoords(e);
                handleWorldClick(wx, wy, sx, sy);
            });

            // Touch support
            canvas.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    const touch = e.touches[0];
                    const { wx, wy, sx, sy } = getWorldCoords(touch);
                    handleWorldClick(wx, wy, sx, sy);
                }
            }, { passive: true });

            // Cursor movement
            document.addEventListener('mousemove', (e) => {
                customCursor.style.left = e.clientX + 'px';
                customCursor.style.top = e.clientY + 'px';
                // Spawn trail hearts occasionally
                if (Math.random() < 0.08 && introComplete) {
                    const trail = document.createElement('div');
                    trail.className = 'cursor-trail';
                    trail.textContent = '💕';
                    trail.style.left = e.clientX + 'px';
                    trail.style.top = e.clientY + 'px';
                    document.body.appendChild(trail);
                    setTimeout(() => trail.remove(), 700);
                }
            });

            // Keyboard controls
            document.addEventListener('keydown', (e) => {
                if (!introComplete) return;
                const step = 200;
                switch (e.key) {
                    case 'ArrowRight':
                    case 'd':
                        mascot.targetX = Math.min(WORLD_WIDTH - 100, mascot.targetX + step);
                        break;
                    case 'ArrowLeft':
                    case 'a':
                        mascot.targetX = Math.max(100, mascot.targetX - step);
                        break;
                    case ' ':
                        e.preventDefault();
                        const objs = getObjectsNear(mascot.x, 100);
                        if (objs.length > 0) {
                            const obj = objs[0];
                            handleObjectInteraction(obj, canvas.width / 2, canvas.height / 2);
                        }
                        break;
                }
            });

            // Intro button
            introBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                initAudio();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                startMusicBox();
                introOverlay.classList.add('hidden');
                introComplete = true;
                updateMascotY();
                mascot.targetX = scenes[0].x;
                mascot.x = scenes[0].x;
                updateCameraTarget();
                camera.x = camera.targetX;
                createSparkleBurst(window.innerWidth / 2, window.innerHeight / 2);
                showToast('Welcome to your journey, Moonpie! 🌙✨');
                setTimeout(() => {
                    introOverlay.style.display = 'none';
                }, 1500);
            });

            // Close popup
            closePopupBtn.addEventListener('click', () => {
                messagePopup.classList.remove('show');
            });

            // Handle resize
            window.addEventListener('resize', () => {
                resizeCanvas();
                updateMascotY();
                updateCameraTarget();
            });

            // ─────────────────────────────────────
            // INITIAL SETUP
            // ─────────────────────────────────────
            mascot.x = scenes[0].x;
            mascot.targetX = scenes[0].x;
            updateMascotY();
            updateCameraTarget();
            camera.x = camera.targetX;
            camera.y = 0;

            // Hide cursor on mobile
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
                customCursor.style.display = 'none';
                document.body.style.cursor = 'auto';
            }

            // ─────────────────────────────────────
            // START
            // ─────────────────────────────────────
            requestAnimationFrame(gameLoop);

            console.log('🎀✨ A Journey for Moonpie — Ready! ✨🎀');
            console.log('Click to explore the world. Use arrow keys or click to move the mascot.');
            console.log('Find interactive objects in each scene!');
            console.log('Created with love by Mochi ❤️');
        })();
    </script>
</body>
  </html>
